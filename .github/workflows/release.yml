# 📄 .github/workflows/release.yml

Save this file as:

```text
.github/workflows/release.yml
```

```yaml
name: HashCatcher Release Pipeline

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  linux-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            python3 \
            python3-pip \
            python3-pyside6 \
            hcxtools \
            hashcat \
            dpkg-dev \
            fakeroot

      - name: Install Python Packages
        run: |
          pip install pyinstaller requests

      - name: Build Linux Binary
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name HashCatcher \
            --icon assets/hashcatcher-logo.png \
            src/main.py

      - name: Create Debian Package Structure
        run: |
          mkdir -p package/DEBIAN
          mkdir -p package/usr/local/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/icons/hicolor/256x256/apps

          cp dist/HashCatcher package/usr/local/bin/hashcatcher
          chmod +x package/usr/local/bin/hashcatcher

          cp assets/hashcatcher-logo.png \
             package/usr/share/icons/hicolor/256x256/apps/hashcatcher.png

          cat > package/DEBIAN/control <<EOF
          Package: hashcatcher
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Tahsasiyahu
          Depends: python3, hcxtools, hashcat
          Description: Offline wireless capture conversion utility for Hashcat workflows
          EOF

          cat > package/usr/share/applications/hashcatcher.desktop <<EOF
          [Desktop Entry]
          Name=HashCatcher
          Exec=hashcatcher
          Icon=hashcatcher
          Type=Application
          Categories=Utility;Security;
          Terminal=false
          EOF

      - name: Build Debian Package
        run: |
          dpkg-deb --build package
          mv package.deb HashCatcher_1.0.0_amd64.deb

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hashcatcher-linux
          path: |
            dist/HashCatcher
            HashCatcher_1.0.0_amd64.deb

  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python Packages
        run: |
          pip install pyinstaller requests PySide6

      - name: Build Windows Executable
        run: |
          pyinstaller ^
            --onefile ^
            --windowed ^
            --name HashCatcher ^
            --icon assets/hashcatcher-logo.png ^
            src/main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hashcatcher-windows
          path: dist/HashCatcher.exe

  macos-build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python Packages
        run: |
          pip3 install pyinstaller requests PySide6

      - name: Build macOS Application
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name HashCatcher \
            --icon assets/hashcatcher-logo.png \
            src/main.py

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hashcatcher-macos
          path: dist/HashCatcher

  github-release:
    needs:
      - linux-build
      - windows-build
      - macos-build

    runs-on: ubuntu-latest

    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: hashcatcher-linux
          path: release-assets/linux

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: hashcatcher-windows
          path: release-assets/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: hashcatcher-macos
          path: release-assets/macos

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/linux/*
            release-assets/windows/*
            release-assets/macos/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

# 🚀 HOW TO USE

## 1. Create workflow folder

```text
.github/workflows/
```

---

## 2. Save file

```text
.github/workflows/release.yml
```

---

## 3. Commit workflow

```bash
git add .
git commit -m "Added release pipeline"
git push origin main --force
```

---

# 🚀 CREATE RELEASE

Create release tag:

```bash
git tag v1.0.0
```

Push tag:

```bash
git push origin v1.0.0
```

---

# ⚡ WHAT HAPPENS AUTOMATICALLY

GitHub Actions now:

* builds Linux binary
* builds Debian package
* builds Windows executable
* builds macOS application
* uploads all release assets
* creates GitHub release page

---

# 📦 DOWNLOAD RELEASE FILES

After workflow completes:

```text
Repository → Releases
```

or:

```text
Repository → Actions → Artifacts
```

